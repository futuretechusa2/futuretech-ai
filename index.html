<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Futura | Future Tech USA</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: transparent;
    }

    button,
    input {
      font: inherit;
    }

    /* FLOATING FUTURA BUTTON */

    #futura-launcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 999999;

      display: flex;
      align-items: center;
      gap: 12px;

      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    #futura-launcher-label {
      padding: 13px 19px;

      background: #ffffff;
      color: #081a36;

      border: 1px solid rgba(190, 148, 50, 0.2);
      border-radius: 999px;

      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;

      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.18);
    }

    #futura-logo-ring {
      width: 88px;
      height: 88px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 50%;

      background:
        radial-gradient(circle, #13294b 0%, #07172f 72%);

      border: 3px solid #d7aa3b;

      box-shadow:
        0 0 0 6px rgba(215, 170, 59, 0.13),
        0 0 30px rgba(215, 170, 59, 0.68);

      animation: futuraGlow 3s ease-in-out infinite;
    }

    #futura-logo-ring img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      display: block;
    }

    @keyframes futuraGlow {
      0%,
      100% {
        transform: scale(1);

        box-shadow:
          0 0 0 6px rgba(215, 170, 59, 0.12),
          0 0 24px rgba(215, 170, 59, 0.48);
      }

      50% {
        transform: scale(1.035);

        box-shadow:
          0 0 0 10px rgba(215, 170, 59, 0.07),
          0 0 44px rgba(215, 170, 59, 0.9);
      }
    }

    /* CHAT WINDOW */

    #futura-chat {
      position: fixed;
      right: 24px;
      bottom: 126px;
      z-index: 999998;

      width: 410px;
      height: 640px;
      max-height: calc(100vh - 155px);

      display: none;
      flex-direction: column;

      background: #ffffff;
      border: 1px solid rgba(205, 158, 51, 0.72);
      border-radius: 25px;
      overflow: hidden;

      box-shadow:
        0 30px 85px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.45);
    }

    #futura-chat.open {
      display: flex;
      animation: futuraOpen 0.28s ease-out;
    }

    @keyframes futuraOpen {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* HEADER */

    #futura-header {
      min-height: 105px;
      padding: 18px;

      display: flex;
      align-items: center;

      background:
        radial-gradient(
          circle at top right,
          rgba(41, 78, 126, 0.35),
          transparent 42%
        ),
        linear-gradient(135deg, #06152d, #0a2549);

      color: #ffffff;
      border-bottom: 3px solid #c9972c;
    }

    #futura-header-logo {
      width: 66px;
      height: 66px;
      min-width: 66px;
      margin-right: 14px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(227, 188, 91, 0.58);
    }

    #futura-header-logo img {
      width: 57px;
      height: 57px;
      object-fit: contain;
      display: block;
    }

    #futura-header-copy {
      min-width: 0;
      flex: 1;
    }

    #futura-title {
      margin: 0 0 4px;

      color: #e0b64d;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 29px;
      line-height: 1;
    }

    #futura-subtitle {
      margin: 0;
      max-width: 245px;

      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      line-height: 1.45;
    }

    #futura-close {
      width: 39px;
      height: 39px;
      min-width: 39px;

      border: 0;
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.09);
      color: #ffffff;

      font-size: 25px;
      line-height: 1;
      cursor: pointer;
    }

    #futura-close:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /* MESSAGES */

    #futura-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;

      background:
        linear-gradient(
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.95)
        ),
        radial-gradient(circle at top right, #f8eac0, transparent 48%);
    }

    .message-row {
      display: flex;
      margin-bottom: 15px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message {
      max-width: 86%;
      padding: 13px 15px;

      border-radius: 18px;

      font-size: 14px;
      line-height: 1.55;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .message.futura {
      color: #17233a;
      background: #f2f4f7;

      border: 1px solid rgba(14, 40, 78, 0.07);
      border-bottom-left-radius: 5px;
    }

    .message.user {
      color: #ffffff;
      background: linear-gradient(135deg, #0c2c56, #06162e);

      border-bottom-right-radius: 5px;
      box-shadow: 0 8px 22px rgba(7, 26, 54, 0.15);
    }

    .message-name {
      display: block;
      margin-bottom: 5px;

      color: #a87919;
      font-size: 12px;
      font-weight: 700;
    }

    /* TYPING INDICATOR */

    #typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;

      width: fit-content;
      margin: 0 20px 12px;
      padding: 11px 14px;

      background: #f2f4f7;
      border-radius: 16px;
    }

    #typing-indicator span {
      width: 7px;
      height: 7px;

      border-radius: 50%;
      background: #b78825;

      animation: typingDot 1.2s infinite;
    }

    #typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    #typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingDot {
      0%,
      60%,
      100% {
        opacity: 0.4;
        transform: translateY(0);
      }

      30% {
        opacity: 1;
        transform: translateY(-5px);
      }
    }

    /* INPUT */

    #futura-input-area {
      padding: 14px;

      display: flex;
      align-items: center;
      gap: 10px;

      background: #ffffff;
      border-top: 1px solid #e4e7ec;
    }

    #futura-input {
      min-width: 0;
      height: 50px;
      flex: 1;

      padding: 0 16px;

      color: #101b2e;
      background: #ffffff;

      border: 1px solid #cfd5df;
      border-radius: 15px;
      outline: none;

      font-size: 15px;
    }

    #futura-input:focus {
      border-color: #c79a31;
      box-shadow: 0 0 0 3px rgba(199, 154, 49, 0.14);
    }

    #futura-send {
      width: 50px;
      height: 50px;
      min-width: 50px;

      border: 0;
      border-radius: 50%;

      background: linear-gradient(135deg, #ddb343, #9a6a12);
      color: #ffffff;

      font-size: 21px;
      cursor: pointer;

      box-shadow: 0 8px 22px rgba(163, 112, 17, 0.25);
    }

    #futura-send:hover {
      transform: translateY(-1px);
    }

    #futura-send:active {
      transform: translateY(0);
    }

    #futura-footer {
      padding: 0 14px 13px;

      color: #7a808a;
      background: #ffffff;

      text-align: center;
      font-size: 10px;
    }

    /* MOBILE */

    @media (max-width: 600px) {
      #futura-launcher {
        right: 14px;
        bottom: 14px;
      }

      #futura-launcher-label {
        display: none;
      }

      #futura-logo-ring {
        width: 72px;
        height: 72px;
      }

      #futura-logo-ring img {
        width: 60px;
        height: 60px;
      }

      #futura-chat {
        right: 10px;
        bottom: 96px;

        width: calc(100vw - 20px);
        height: calc(100vh - 112px);
        max-height: none;

        border-radius: 21px;
      }

      #futura-header {
        min-height: 94px;
        padding: 14px;
      }

      #futura-header-logo {
        width: 56px;
        height: 56px;
        min-width: 56px;
      }

      #futura-header-logo img {
        width: 49px;
        height: 49px;
      }

      #futura-title {
        font-size: 25px;
      }

      #futura-subtitle {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>

  <!-- FLOATING FUTURA LOGO -->

  <button id="futura-launcher" aria-label="Open Futura">
    <span id="futura-launcher-label">Ask Futura</span>

    <span id="futura-logo-ring">
      <img src="./futura-logo.png" alt="Futura logo" />
    </span>
  </button>

  <!-- FUTURA CHAT -->

  <section id="futura-chat" aria-label="Futura chat assistant">

    <header id="futura-header">

      <div id="futura-header-logo">
        <img src="./futura-logo.png" alt="Futura logo" />
      </div>

      <div id="futura-header-copy">
        <h2 id="futura-title">Futura</h2>

        <p id="futura-subtitle">
          AI Payment Solutions Specialist &amp; Customer Concierge
        </p>
      </div>

      <button id="futura-close" aria-label="Close Futura">×</button>

    </header>

    <main id="futura-messages"></main>

    <div id="typing-indicator" aria-label="Futura is typing">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div id="futura-input-area">

      <input
        id="futura-input"
        type="text"
        placeholder="What can I help you with today?"
        autocomplete="off"
        aria-label="Type your message"
      />

      <button id="futura-send" aria-label="Send message">➤</button>

    </div>

    <div id="futura-footer">
      No pressure. No obligation. Just helpful answers.
    </div>

  </section>

  <script>
    const launcher = document.getElementById("futura-launcher");
    const chat = document.getElementById("futura-chat");
    const closeButton = document.getElementById("futura-close");
    const sendButton = document.getElementById("futura-send");
    const input = document.getElementById("futura-input");
    const messages = document.getElementById("futura-messages");
    const typingIndicator = document.getElementById("typing-indicator");

    let conversationStep = 0;

    const customerStory = {
      businessType: "",
      monthlyVolume: "",
      currentSystem: "",
      mainConcern: ""
    };

    const greeting =
`Hello! I'm Futura.

I'm Future Tech USA's AI Payment Solutions Specialist & Customer Concierge.

I'm here to help business owners make informed decisions about their payment solutions.

Whether you're opening a new business, exploring POS systems, upgrading equipment, or simply comparing your options, I'm happy to help.

No pressure. No obligation. Just helpful answers.

What can I help you with today?`;

    function addMessage(sender, text) {
      const row = document.createElement("div");
      row.className = "message-row " + sender;

      const bubble = document.createElement("div");
      bubble.className = "message " + sender;

      if (sender === "futura") {
        const name = document.createElement("span");
        name.className = "message-name";
        name.textContent = "Futura";
        bubble.appendChild(name);
      }

      const messageText = document.createElement("span");
      messageText.textContent = text;

      bubble.appendChild(messageText);
      row.appendChild(bubble);
      messages.appendChild(row);

      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      typingIndicator.style.display = "flex";
    }

    function hideTyping() {
      typingIndicator.style.display = "none";
    }

    function getFuturaResponse(userMessage) {
      const message = userMessage.toLowerCase();

      if (
        message.includes("hello") ||
        message.includes("hi") ||
        message.includes("hey")
      ) {
        return "Hello! It's a pleasure to meet you. Are you looking for help with payment processing, a POS system, equipment, online payments, or something else?";
      }

      if (
        message.includes("clover") ||
        message.includes("pos") ||
        message.includes("point of sale")
      ) {
        customerStory.mainConcern = "POS system";
        conversationStep = 1;

        return "I'd be happy to help you explore POS options. The right solution depends on your business type, daily operations, reporting needs, and payment environment. What type of business do you operate?";
      }

      if (
        message.includes("fee") ||
        message.includes("rate") ||
        message.includes("cost") ||
        message.includes("expensive")
      ) {
        customerStory.mainConcern = "processing costs";
        conversationStep = 1;

        return "I understand. Processing costs are an important concern for many business owners. Available options can depend on factors such as business type, monthly volume, and how customers usually pay. What type of business do you operate?";
      }

      if (
        message.includes("consultation") ||
        message.includes("appointment") ||
        message.includes("contact") ||
        message.includes("call")
      ) {
        return "I'd be happy to help arrange a complimentary consultation. Please share your preferred contact method, such as email or phone, and the best time for the Future Tech USA team to reach you.";
      }

      if (conversationStep === 0) {
        conversationStep = 1;

        return "Thank you for sharing that. I'd be happy to learn more so I can provide helpful guidance. What type of business do you operate?";
      }

      if (conversationStep === 1) {
        customerStory.businessType = userMessage;
        conversationStep = 2;

        return "Thank you. Approximately how much do you process in card payments during an average month?";
      }

      if (conversationStep === 2) {
        customerStory.monthlyVolume = userMessage;
        conversationStep = 3;

        return "Are you currently using a POS system or payment provider? If so, which one?";
      }

      if (conversationStep === 3) {
        customerStory.currentSystem = userMessage;
        conversationStep = 4;

        return "What is the most important improvement you're looking for: lower costs, upgraded equipment, better reporting, stronger support, online payments, or another need?";
      }

      if (conversationStep === 4) {
        customerStory.mainConcern = userMessage;
        conversationStep = 5;

        return `Thank you. Based on what you've shared, I understand that you operate ${customerStory.businessType || "a business"}, process approximately ${customerStory.monthlyVolume || "an unspecified monthly amount"}, currently use ${customerStory.currentSystem || "an existing payment solution"}, and would like help with ${customerStory.mainConcern}.

There may be several solutions worth exploring. Would you like information about a complimentary consultation with a Future Tech USA payment specialist?`;
      }

      return "Thank you for explaining that. Could you tell me a little more about what you would like to improve with your current payment or POS setup?";
    }

    function sendMessage() {
      const userMessage = input.value.trim();

      if (!userMessage) {
        return;
      }

      addMessage("user", userMessage);
      input.value = "";

      showTyping();

      window.setTimeout(() => {
        hideTyping();

        const response = getFuturaResponse(userMessage);
        addMessage("futura", response);
      }, 850);
    }

    launcher.addEventListener("click", () => {
      chat.classList.add("open");
      input.focus();

      if (messages.children.length === 0) {
        addMessage("futura", greeting);
      }
    });

    closeButton.addEventListener("click", () => {
      chat.classList.remove("open");
    });

    sendButton.addEventListener("click", sendMessage);

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
